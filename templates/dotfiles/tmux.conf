#Remapping prefix to C-a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

#Theme (only if tmux-themepack is installed, so tmux doesn't error without it)
# Install with: git clone https://github.com/jimeh/tmux-themepack ~/.tmux-themepack
if-shell '[ -f ~/.tmux-themepack/powerline/block/blue.tmuxtheme ]' \
  'source-file ~/.tmux-themepack/powerline/block/blue.tmuxtheme'
