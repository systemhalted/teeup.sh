# starship.toml — managed by teeup, symlinked to ~/.config/starship.toml
# Reference: https://starship.rs/config/   |   Presets: `starship preset --list`

# Blank line before each prompt for breathing room.
add_newline = true

# Prompt character: ❯ green on success, red after a failed command.
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

# Show up to 4 path components, relative to the git repo root.
[directory]
truncation_length = 4
truncate_to_repo = true

# Flag slow commands.
[cmd_duration]
min_time = 2000
format = "took [$duration](bold yellow) "

# Tip: for icon glyphs (requires a Nerd Font), run:
#   starship preset nerd-font-symbols -o ~/.config/starship.toml
